name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android build tools
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Read app version
        id: app_version
        run: |
          version_name="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle | head -n 1)"
          if [ -z "$version_name" ]; then
            echo "versionName was not found in app/build.gradle" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew clean assembleRelease

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoshimiLocalify-apk
          path: artifacts/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk
          if-no-files-found: error

      - name: Create version tag
        run: |
          tag_name="${{ steps.app_version.outputs.version_name }}"
          git fetch --tags

          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$tag_name")"
            if [ "$tagged_commit" != "$GITHUB_SHA" ]; then
              echo "Tag $tag_name already exists on commit $tagged_commit, not current commit $GITHUB_SHA" >&2
              exit 1
            fi
          else
            git tag "$tag_name" "$GITHUB_SHA"
            git push origin "$tag_name"
          fi

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${{ steps.app_version.outputs.version_name }}"
          apk_path="artifacts/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk"
          gh release view "$tag_name" >/dev/null 2>&1 || gh release create "$tag_name" --title "$tag_name" --notes ""
          gh release upload "$tag_name" "$apk_path" --clobber
