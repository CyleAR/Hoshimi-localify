name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android build tools
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Read app version
        id: app_version
        run: |
          version_name="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle | head -n 1)"
          if [ -z "$version_name" ]; then
            echo "versionName was not found in app/build.gradle" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew clean assembleRelease

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HoshimiLocalify_${{ steps.app_version.outputs.version_name }}
          path: artifacts/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk
          if-no-files-found: error
