name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK components
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/platforms/android-34
            /usr/local/lib/android/sdk/build-tools/34.0.0
            /usr/local/lib/android/sdk/ndk/26.3.11579264
            /usr/local/lib/android/sdk/cmake/3.22.1
          key: ${{ runner.os }}-android-sdk-34-26.3.11579264-3.22.1

      - name: Install Android build tools
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Read app version
        id: app_version
        run: |
          version_name="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle | head -n 1)"
          if [ -z "$version_name" ]; then
            echo "versionName was not found in app/build.gradle" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Restore release keystore
        env:
          HOSHIMI_RELEASE_KEYSTORE_BASE64: ${{ secrets.HOSHIMI_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$HOSHIMI_RELEASE_KEYSTORE_BASE64" ]; then
            echo "$HOSHIMI_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          fi

      - name: Build APK
        env:
          HOSHIMI_RELEASE_STORE_FILE: release.keystore
          HOSHIMI_RELEASE_STORE_PASSWORD: ${{ secrets.HOSHIMI_RELEASE_STORE_PASSWORD }}
          HOSHIMI_RELEASE_KEY_ALIAS: ${{ secrets.HOSHIMI_RELEASE_KEY_ALIAS }}
          HOSHIMI_RELEASE_KEY_PASSWORD: ${{ secrets.HOSHIMI_RELEASE_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk"

      - name: Create or update version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag_name="${{ steps.app_version.outputs.version_name }}"
          git fetch --tags

          git tag -f "$tag_name" "$GITHUB_SHA"
          git push -f origin "$tag_name"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${{ steps.app_version.outputs.version_name }}"
          apk_path="app/build/outputs/apk/release/HoshimiLocalify_${{ steps.app_version.outputs.version_name }}.apk"
          gh release view "$tag_name" >/dev/null 2>&1 || gh release create "$tag_name" --title "$tag_name" --notes ""
          gh release upload "$tag_name" "$apk_path" --clobber
